name: Destroy Preview Environment

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      environment:
        description: "The environment to destroy (e.g. preview-pr-123)"
        required: false

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 🕒 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Resolve stage
        id: stage
        run: |
          if [ "${{ github.event.pull_request.number }}" != "" ]; then
            echo "stage=preview-pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "stage=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          fi

      - name: 🛑 Allow only preview environments
        run: |
          STAGE="${{ steps.stage.outputs.stage }}"

          if [[ "$STAGE" != preview-* ]]; then
            echo "❌ Only preview environments can be destroyed"
            exit 1
          fi

          echo "✅ Allowed to destroy: $STAGE"

      - name: 🧹 Destroy
        run: |
          pnpm sst remove --stage "${{ steps.stage.outputs.stage }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
