name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
    outputs:
      url:
        description: "Preview URL"
        value: ${{ jobs.deploy.outputs.url }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: ${{ inputs.environment }}

    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: 🌩️ Checkout repo
        uses: actions/checkout@v4

      - name: 🕒 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔨 Build
        run: pnpm build

      - name: 🚀 Deploy to AWS (${{ inputs.environment }})
        id: deploy
        run: |
          set -o pipefail

          pnpm sst deploy --stage ${{ inputs.environment }} | tee deploy.log

          # Extract CloudFront URL AFTER successful deploy
          URL=$(grep -Eo 'https://[^ ]+cloudfront.net' deploy.log | head -n 1)

          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SST_CERT_ARN: ${{ secrets.SST_CERT_ARN }}
          AWS_REGION: ${{ vars.AWS_REGION }}